<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7c86b">
<title>マンカラ勝ち筋ナビ v4.6 連続ターン先読みAI対応</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg1:#fff7d7;--bg2:#f3b95b;--ink:#4a3019;--green:#57b86b;--orange:#ffb44c;--blue:#6eb6ff;--red:#ff6b6b;--panel:rgba(255,255,255,.78);--shadow:rgba(104,62,22,.18)}
html,body{margin:0;min-height:100%;background:linear-gradient(160deg,var(--bg1),#ffe2a0 55%,var(--bg2));color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
body{padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom)}
.app{width:min(760px,100%);margin:0 auto;padding:10px 0 16px;display:grid;gap:10px}.top{display:flex;align-items:center;justify-content:space-between;gap:8px}.title{font-size:clamp(22px,6vw,34px);font-weight:1000;letter-spacing:.02em;color:#5a381a;-webkit-text-stroke:3px rgba(255,255,255,.85);paint-order:stroke fill;filter:drop-shadow(0 3px 0 rgba(112,70,28,.12))}.pill{border:2px solid rgba(94,58,26,.18);border-radius:999px;background:var(--panel);padding:7px 10px;font-weight:900;box-shadow:0 5px 0 rgba(112,70,28,.08);white-space:nowrap}.board{display:grid;grid-template-columns:68px 1fr 68px;gap:7px;align-items:stretch;background:rgba(119,75,33,.18);border:3px solid rgba(96,58,24,.22);border-radius:28px;padding:8px;box-shadow:0 12px 25px var(--shadow), inset 0 0 0 5px rgba(255,255,255,.22)}.store{border:0;border-radius:24px;background:linear-gradient(#fff7df,#ffd28b);box-shadow:inset 0 -5px 0 rgba(119,75,33,.13),0 4px 0 rgba(92,54,23,.12);font-weight:1000;color:var(--ink);display:grid;place-items:center;min-height:176px;position:relative}.store .num{font-size:42px}.store .label{position:absolute;top:9px;font-size:12px;background:rgba(255,255,255,.7);border-radius:999px;padding:3px 7px}.pits{display:grid;grid-template-rows:1fr 1fr;gap:8px}.row{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}.pit{border:0;border-radius:22px;min-height:82px;background:linear-gradient(#fffef7,#ffe1a7);box-shadow:inset 0 -6px 0 rgba(132,77,29,.13),0 4px 0 rgba(92,54,23,.12);color:var(--ink);font-weight:1000;position:relative;padding:6px}.pit:active,.pit.selected{transform:translateY(2px);box-shadow:inset 0 -3px 0 rgba(132,77,29,.13),0 2px 0 rgba(92,54,23,.1)}.pit.best{outline:5px solid rgba(63,174,93,.75);background:linear-gradient(#f3fff0,#c9f8c6)}.pit.capture{outline:5px solid rgba(255,111,76,.75);background:linear-gradient(#fff5eb,#ffd0b7)}.pit.extra{outline:5px solid rgba(96,171,255,.8);background:linear-gradient(#eff8ff,#cce7ff)}.pit small{position:absolute;left:7px;top:6px;font-size:11px;opacity:.58}.stones{height:44px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:2px;overflow:hidden}.stone{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff7ce,#e58d32 65%,#a75c1c);box-shadow:0 1px 1px rgba(0,0,0,.18)}.count{font-size:25px;line-height:1}.panel{background:var(--panel);border:2px solid rgba(94,58,26,.14);border-radius:22px;padding:10px;box-shadow:0 8px 20px var(--shadow)}.status{font-size:18px;font-weight:1000;text-align:center;line-height:1.35}.sub{font-size:13px;text-align:center;opacity:.78;margin-top:4px}.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{border:0;border-radius:18px;background:#fff8e7;color:var(--ink);font-weight:1000;padding:12px 8px;font-size:15px;box-shadow:0 4px 0 rgba(99,58,22,.15)}.btn.primary{background:linear-gradient(#fff2b8,#ffca58)}.btn.ai{background:linear-gradient(#e9fff0,#9be3aa)}.btn.danger{background:linear-gradient(#fff1f1,#ffaaaa)}.editGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.editGrid label{font-size:12px;font-weight:900}.editGrid input,.editGrid select{width:100%;font-size:16px;border:2px solid rgba(94,58,26,.18);border-radius:12px;padding:8px;background:#fff}.details{font-size:13px;line-height:1.55}.details b{font-weight:1000}.hintList{display:grid;gap:6px;margin-top:7px}.hintItem{padding:8px;border-radius:14px;background:rgba(255,255,255,.66);display:flex;justify-content:space-between;gap:8px}.tag{border-radius:999px;padding:2px 7px;font-size:12px;font-weight:1000}.tag.cap{background:#ffd3c2}.tag.ext{background:#cfe9ff}.tag.best{background:#c9f8c6}@media(max-width:560px){.board{grid-template-columns:48px 1fr 48px;padding:6px;gap:5px;border-radius:22px}.store{border-radius:18px;min-height:156px}.store .num{font-size:31px}.store .label{font-size:10px;padding:2px 5px;top:6px}.row{gap:5px}.pits{gap:6px}.pit{min-height:74px;border-radius:17px;padding:5px}.stones{height:38px}.stone{width:10px;height:10px}.count{font-size:22px}.controls{grid-template-columns:1fr 1fr}.controls .wide{grid-column:1/-1}.editGrid{grid-template-columns:1fr}.title{font-size:25px}.pill{font-size:12px;padding:6px 8px}}
</style>
</head>
<body>
<main class="app">
 <div class="top"><div class="title">マンカラ勝ち筋ナビ</div><div class="pill" id="turnPill">あなたの番</div></div>
 <section class="board" aria-label="マンカラ盤面">
  <button class="store" id="store1" type="button"><span class="label">相手ゴール</span><span class="num">0</span></button>
  <div class="pits">
   <div class="row" id="oppRow"></div>
   <div class="row" id="myRow"></div>
  </div>
  <button class="store" id="store0" type="button"><span class="label">自分ゴール</span><span class="num">0</span></button>
 </section>
 <section class="panel">
  <div class="status" id="status">下の穴をタッチして手を試せます</div>
  <div class="sub" id="lastMove">v4.7 安定AI対応：連続ターンは最大2回まで読み、固まらないよう安全制限を入れています。</div>
 </section>
 <section class="controls">
  <button class="btn ai wide" id="aiBtn">AIおすすめを表示</button>
  <button class="btn primary" id="undoBtn">一手戻す</button>
  <button class="btn" id="swapBtn">手番切替</button>
  <button class="btn danger" id="resetBtn">リセット</button>
 </section>
 <section class="panel details" id="analysisBox">AIおすすめを押すと、横取り・追加ターン連鎖・相手の横取りリスクまで見ます。</section>
 <section class="panel">
  <div style="font-weight:1000;margin-bottom:7px">盤面を手入力で合わせる</div>
  <div class="editGrid">
   <label>自分側 6穴（左から）<input id="myInput" inputmode="numeric" value="4,4,4,4,4,4"></label>
   <label>相手側 6穴（左から）<input id="oppInput" inputmode="numeric" value="4,4,4,4,4,4"></label>
   <label>自分ゴール<input id="myStoreInput" inputmode="numeric" value="0"></label>
   <label>相手ゴール<input id="oppStoreInput" inputmode="numeric" value="0"></label>
   <label>次の手番<select id="turnInput"><option value="0">自分</option><option value="1">相手</option></select></label>
   <button class="btn primary" id="applyBtn" type="button">この盤面にする</button>
  </div>
 </section>
</main>
<script>
const PITS=6, START=4;
let state={pits:[[4,4,4,4,4,4],[4,4,4,4,4,4]],stores:[0,0],turn:0,gameOver:false};
let history=[]; let marks={best:null,capture:null,extra:null};
const $=id=>document.getElementById(id);
function clone(s){return JSON.parse(JSON.stringify(s))}
function sum(a){return a.reduce((x,y)=>x+y,0)}
function opposite(i){return PITS-1-i}
function legalMoves(s,player=s.turn){return s.pits[player].map((v,i)=>v>0?i:null).filter(v=>v!==null)}
function sideEmpty(s,p){return sum(s.pits[p])===0}
function finishIfNeeded(s){ if(sideEmpty(s,0)||sideEmpty(s,1)){ for(let p=0;p<2;p++){s.stores[p]+=sum(s.pits[p]); s.pits[p]=Array(PITS).fill(0)} s.gameOver=true; } return s; }
function move(s,pit){
 const ns=clone(s); const player=ns.turn; if(ns.gameOver||ns.pits[player][pit]<=0) return {state:ns,invalid:true};
 let stones=ns.pits[player][pit]; ns.pits[player][pit]=0; let side=player, idx=pit; let last=null;
 while(stones>0){
  idx++;
  if(idx===PITS){
   if(side===player){ ns.stores[player]++; stones--; last={type:'store',player}; if(stones===0) break; }
   side=1-side; idx=-1; continue;
  }
  ns.pits[side][idx]++; stones--; last={type:'pit',side,idx};
 }
 let capture=0, capturedFrom=null;
 if(last && last.type==='pit' && last.side===player && ns.pits[player][last.idx]===1){
  const oi=opposite(last.idx); const opp=1-player;
  if(ns.pits[opp][oi]>0){
   capture=ns.pits[opp][oi]+1; capturedFrom=oi;
   ns.stores[player]+=capture; ns.pits[player][last.idx]=0; ns.pits[opp][oi]=0;
  }
 }
 const extra=last && last.type==='store' && last.player===player;
 if(!extra) ns.turn=1-player;
 finishIfNeeded(ns);
 return {state:ns,player,pit,last,capture,capturedFrom,extra,invalid:false};
}
function evaluate(s,root){
 if(s.gameOver) return (s.stores[root]-s.stores[1-root])*100;
 let score=(s.stores[root]-s.stores[1-root])*18 + (sum(s.pits[root])-sum(s.pits[1-root]))*1.4;
 legalMoves(s,root).forEach(i=>{const r=move({...clone(s),turn:root},i); if(r.capture) score+=r.capture*2.2; if(r.extra) score+=7;});
 legalMoves(s,1-root).forEach(i=>{const r=move({...clone(s),turn:1-root},i); if(r.capture) score-=r.capture*2.8; if(r.extra) score-=5;});
 return score;
}
function moveLabel(r){return (r.player===0?'自分':'相手')+(r.pit+1)+(r.extra?'→もう一回':'')+(r.capture?'→横取り'+r.capture+'個':'')}
function lineText(line){return line&&line.length?line.map(moveLabel).join(' / '):''}
const AI_LIMIT_MS=1200, AI_MAX_DEPTH=5, AI_MAX_EXTRA_CHAIN=2;
function boardKey(s,depth,extraChain){return s.turn+'|'+depth+'|'+extraChain+'|'+s.stores.join(',')+'|'+s.pits[0].join(',')+'|'+s.pits[1].join(',')}
function minimaxSafe(s,depth,root,ctx,alpha=-Infinity,beta=Infinity,extraChain=0){
 if(Date.now()-ctx.start>ctx.limitMs){ctx.timedOut=true; return {score:evaluate(s,root),line:[]};}
 if(depth<=0||s.gameOver) return {score:evaluate(s,root),line:[]};
 const key=boardKey(s,depth,extraChain); if(ctx.cache.has(key)) return ctx.cache.get(key);
 const seenKey=s.turn+'|'+s.stores.join(',')+'|'+s.pits[0].join(',')+'|'+s.pits[1].join(',');
 if(ctx.seen.has(seenKey)) return {score:evaluate(s,root),line:[]};
 ctx.seen.add(seenKey);
 const moves=legalMoves(s,s.turn);
 if(!moves.length){const ns=clone(s); ns.turn=1-ns.turn; ctx.seen.delete(seenKey); return minimaxSafe(ns,depth-1,root,ctx,alpha,beta,0)}
 const max=s.turn===root; let best={score:max?-Infinity:Infinity,move:moves[0],result:null,line:[]};
 for(const m of moves){
  if(Date.now()-ctx.start>ctx.limitMs){ctx.timedOut=true; break;}
  const r=move(s,m);
  const samePlayer=r.extra && !r.state.gameOver;
  const allowedExtra=samePlayer && extraChain<ctx.maxExtraChain;
  const nextDepth=allowedExtra?depth-1:depth-1;
  let nxt;
  if(samePlayer && !allowedExtra){
   nxt={score:evaluate(r.state,root),line:[]};
  }else{
   nxt=minimaxSafe(r.state,nextDepth,root,ctx,alpha,beta,allowedExtra?extraChain+1:0);
  }
  const sign=r.player===root?1:-1;
  const immediate=sign*((r.capture? r.capture*4.5:0) + (r.extra?10:0));
  const adjusted=nxt.score + immediate;
  const candidateLine=[r].concat(nxt.line||[]).slice(0,6);
  if(max ? adjusted>best.score : adjusted<best.score) best={score:adjusted,move:m,result:r,line:candidateLine};
  if(max){alpha=Math.max(alpha,adjusted); if(beta<=alpha) break;} else {beta=Math.min(beta,adjusted); if(beta<=alpha) break;}
 }
 ctx.seen.delete(seenKey);
 ctx.cache.set(key,best);
 return best;
}
function makeAiContext(limitMs=AI_LIMIT_MS){return {start:Date.now(),limitMs,cache:new Map(),seen:new Set(),timedOut:false,maxExtraChain:AI_MAX_EXTRA_CHAIN}}
function chainAfterFirst(r,root,ctx){
 if(!r.extra||r.state.gameOver) return '';
 const look=minimaxSafe(r.state,2,root,ctx,-Infinity,Infinity,1);
 const ownLine=(look.line||[]).filter(x=>x.player===root).slice(0,2);
 return ownLine.length?'連続候補：'+ownLine.map(x=>(x.pit+1)+'番'+(x.capture?'横取り'+x.capture+'個':'')).join(' → '):'';
}
function aiAnalysis(){
 const player=state.turn; const moves=legalMoves(state,player); if(!moves.length) return [];
 const ctx=makeAiContext();
 const result=moves.map(i=>{
  const r=move(state,i);
  const look=minimaxSafe(r.state,AI_MAX_DEPTH,player,ctx);
  let risk=0;
  if(r.state.turn===1-player && !r.state.gameOver){ legalMoves(r.state,1-player).forEach(j=>{const rr=move({...clone(r.state),turn:1-player},j); risk=Math.max(risk,rr.capture||0)}); }
  const chain=chainAfterFirst(r,player,ctx);
  const score=look.score + (r.capture? r.capture*8:0) + (r.extra?18:0) - risk*6;
  return {pit:i,result:r,score,capture:r.capture,extra:r.extra,risk,chain,line:look.line,timedOut:ctx.timedOut};
 }).sort((a,b)=>b.score-a.score);
 return result;
}
function stonesHTML(n){let html=''; for(let i=0;i<Math.min(n,24);i++) html+='<span class="stone"></span>'; return html;}
function render(){
 $('store0').querySelector('.num').textContent=state.stores[0]; $('store1').querySelector('.num').textContent=state.stores[1];
 $('turnPill').textContent=state.gameOver?'終了':(state.turn===0?'あなたの番':'相手の番');
 $('myRow').innerHTML=''; $('oppRow').innerHTML='';
 for(let i=0;i<PITS;i++) addPit(1,i,$('oppRow'),PITS-i); for(let i=0;i<PITS;i++) addPit(0,i,$('myRow'),i+1);
 $('myInput').value=state.pits[0].join(','); $('oppInput').value=state.pits[1].join(','); $('myStoreInput').value=state.stores[0]; $('oppStoreInput').value=state.stores[1]; $('turnInput').value=state.turn;
 if(state.gameOver){ const diff=state.stores[0]-state.stores[1]; $('status').textContent=diff>0?'勝ち！ '+state.stores[0]+' 対 '+state.stores[1]:diff<0?'負け… '+state.stores[0]+' 対 '+state.stores[1]:'引き分け '+state.stores[0]+' 対 '+state.stores[1]; }
}
function addPit(player,i,parent,label){ const b=document.createElement('button'); b.type='button'; b.className='pit'; if(player===state.turn&&i===marks.best)b.classList.add('best'); if(player===state.turn&&i===marks.capture)b.classList.add('capture'); if(player===state.turn&&i===marks.extra)b.classList.add('extra'); b.innerHTML=`<small>${player===0?'自分':'相手'}${label}</small><div class="stones">${stonesHTML(state.pits[player][i])}</div><div class="count">${state.pits[player][i]}</div>`; b.onclick=()=>playPit(player,i); parent.appendChild(b); }
function playPit(player,i){ if(state.gameOver) return; if(player!==state.turn){$('status').textContent='今は '+(state.turn===0?'自分側':'相手側')+' の番です'; return;} if(state.pits[player][i]<=0){$('status').textContent='石がない穴は選べません'; return;} history.push(clone(state)); marks={best:null,capture:null,extra:null}; const r=move(state,i); state=r.state; let msg=(player===0?'自分':'相手')+'の'+(i+1)+'番を選択'; if(r.capture) msg+='：横取りで '+r.capture+' 個ゲット！'; if(r.extra) msg+='：ゴールぴったりでもう一回'; $('lastMove').textContent=msg; $('analysisBox').textContent='AIおすすめを押すと、この盤面から再計算します。'; render(); }
function showAI(){ const a=aiAnalysis(); if(!a.length){$('analysisBox').textContent='打てる手がありません。';return;} const best=a[0]; marks={best:best.pit,capture:best.capture?best.pit:null,extra:best.extra?best.pit:null}; $('status').textContent=(state.turn===0?'自分':'相手')+'は '+(best.pit+1)+'番がおすすめ';
 $('analysisBox').innerHTML='<b>おすすめ：'+(best.pit+1)+'番</b>'+ (best.capture?'　<span class="tag cap">横取り '+best.capture+'個</span>':'') + (best.extra?'　<span class="tag ext">もう一回</span>':'') + '<div class="hintList">'+ a.slice(0,6).map((x,k)=>'<div class="hintItem"><span>'+(k+1)+'位：'+(x.pit+1)+'番 '+(x.capture?'横取り'+x.capture+'個 ':'')+(x.extra?'もう一回 ':'')+(x.chain?' '+x.chain+' ':'')+(x.risk?'相手横取りリスク'+x.risk+'個':'')+'</span><span class="tag '+(k===0?'best':'')+'">'+Math.round(x.score)+'</span></div>').join('')+'</div><div class="sub">点数はアプリ内の簡易AI評価です。横取り・追加ターン連鎖・次の相手横取りリスクを含めています。計算が重い盤面では安全のため浅めに止めます。</div>';
 render(); }
function parseNums(v){return v.split(/[、,\s]+/).filter(Boolean).map(x=>Math.max(0,parseInt(x,10)||0)).slice(0,PITS)}
$('aiBtn').onclick=showAI; $('undoBtn').onclick=()=>{if(history.length){state=history.pop(); marks={best:null,capture:null,extra:null}; $('lastMove').textContent='一手戻しました'; render();}};
$('swapBtn').onclick=()=>{state.turn=1-state.turn; marks={best:null,capture:null,extra:null}; $('lastMove').textContent='手番を切り替えました'; render();};
$('resetBtn').onclick=()=>{history.push(clone(state)); state={pits:[Array(PITS).fill(START),Array(PITS).fill(START)],stores:[0,0],turn:0,gameOver:false}; marks={best:null,capture:null,extra:null}; $('lastMove').textContent='初期盤面に戻しました'; $('analysisBox').textContent='AIおすすめを押すと、横取り・追加ターン連鎖・相手の横取りリスクまで見ます。v4.7は固まり防止の安全制限つきです。'; render();};
$('applyBtn').onclick=()=>{let my=parseNums($('myInput').value), op=parseNums($('oppInput').value); while(my.length<PITS)my.push(0); while(op.length<PITS)op.push(0); history.push(clone(state)); state={pits:[my,op],stores:[parseInt($('myStoreInput').value,10)||0,parseInt($('oppStoreInput').value,10)||0],turn:parseInt($('turnInput').value,10)||0,gameOver:false}; finishIfNeeded(state); marks={best:null,capture:null,extra:null}; $('lastMove').textContent='入力した盤面に合わせました'; render();};
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
render();
</script>
</body>
</html>
