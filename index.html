<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8b5a2b" />
  <title>マンカラ勝ち筋ナビ</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">MANCALA AI TRAINER</p>
        <h1>マンカラ勝ち筋ナビ</h1>
        <p class="lead">遊びながら、次の一手を読む練習アプリ</p>
      </div>
      <button id="newGameBtn" class="ghost">新しく始める</button>
    </header>

    <section class="status-card">
      <div>
        <p class="label">現在</p>
        <p id="turnText" class="turn">あなたの手番</p>
      </div>
      <div class="scoreline">
        <span>相手 <b id="scoreCpu">0</b></span>
        <span>あなた <b id="scoreHuman">0</b></span>
      </div>
    </section>

    <section class="board-wrap" aria-label="マンカラ盤面">
      <div class="board">
        <div class="store cpu-store">
          <span class="store-label">相手</span>
          <strong id="cpuStore">0</strong>
        </div>
        <div class="pits cpu-pits" id="cpuPits"></div>
        <div class="pits human-pits" id="humanPits"></div>
        <div class="store human-store">
          <span class="store-label">あなた</span>
          <strong id="humanStore">0</strong>
        </div>
      </div>
    </section>

    <section class="coach-card">
      <div class="coach-head">
        <div>
          <p class="label">AIコーチ</p>
          <h2 id="bestMoveTitle">おすすめを計算中</h2>
        </div>
        <button id="hintBtn" class="primary">おすすめ表示</button>
      </div>
      <p id="coachReason" class="reason">あなたの手番になると、勝ち筋の良い穴を光らせます。</p>
      <div id="ranking" class="ranking"></div>
    </section>

    <section class="controls">
      <button id="undoBtn" class="soft">1手戻す</button>
      <button id="cpuMoveBtn" class="soft">相手AIを動かす</button>
      <button id="resetBtn" class="soft danger">リセット</button>
    </section>

    <section class="rules">
      <h3>ルール</h3>
      <p>片側6穴・各4個スタート。自分のストアには入れ、相手のストアは飛ばします。最後の石が自分の空穴に入ると向かいの石を取ります。最後の石が自分のストアなら連続手番です。</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
